<!-- Checkout Section -->
<div class="container my-5">
  <h2>Checkout</h2>
  <div class="card p-4 shadow-sm">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" id="checkoutName" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="checkoutEmail" class="form-control" required>
    </div>
    <button class="btn btn-success w-100" onclick="proceedToPayment()">Proceed to Payment</button>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- Darkmode Toggle -->
<script>
  const darkModeToggle = document.getElementById('darkModeToggle');
  const darkModeIcon = document.getElementById('darkModeIcon');
  const htmlElement = document.documentElement;

  const currentTheme = localStorage.getItem('theme') || 'light';
  htmlElement.setAttribute('data-bs-theme', currentTheme);
  updateIcon(currentTheme);

  darkModeToggle.addEventListener('click', () => {
    const currentTheme = htmlElement.getAttribute('data-bs-theme');
    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
    htmlElement.setAttribute('data-bs-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    updateIcon(newTheme);
  });

  function updateIcon(theme){
    if (theme === 'dark'){
      darkModeIcon.className = 'bi bi-sun-fill';
    } else {
      darkModeIcon.className = 'bi bi-moon-stars-fill';
    }
  }
</script>

<!-- Checkout Logic -->
<script>
  function proceedToPayment() {
    const name = document.getElementById('checkoutName').value.trim();
    const email = document.getElementById('checkoutEmail').value.trim();

    if (!name || !email) {
      alert("Please fill in all fields!");
      return;
    }

    // Simpan data checkout
    localStorage.setItem('checkoutName', name);
    localStorage.setItem('checkoutEmail', email);

    // Redirect ke payment page
    window.location.href = "payment.html";
  }
  </script>
