<!-- Cart Section -->

    <img src="https://cdn1.sgliteasset.com/default/images/webstore/webstore/cart/cart-empty.png"

  </table>

 <div id="cartActions" style="display:none;">

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- Darkmode Toggle -->
<script>
  const darkModeToggle = document.getElementById('darkModeToggle');
  const darkModeIcon = document.getElementById('darkModeIcon');
  const htmlElement = document.documentElement;

  const currentTheme = localStorage.getItem('theme') || 'light';
  htmlElement.setAttribute('data-bs-theme', currentTheme);
  updateIcon(currentTheme);

  darkModeToggle.addEventListener('click', () => {
    const currentTheme = htmlElement.getAttribute('data-bs-theme');
    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
    htmlElement.setAttribute('data-bs-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    updateIcon(newTheme);
  });

  function updateIcon(theme){
    if (theme === 'dark'){
      darkModeIcon.className = 'bi bi-sun-fill';
    } else {
      darkModeIcon.className = 'bi bi-moon-stars-fill';
    }
  }
</script>

<!-- Cart Logic -->
<script>
  function addToCart() {
    const name = document.getElementById('productName').value;
    const price = parseFloat(document.getElementById('productPrice').value);
    const quantity = parseInt(document.getElementById('productQty').value);

    if (!name || isNaN(price) || isNaN(quantity)) {
      alert("Please fill in all fields!");
      return;
    }

    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let found = cart.find(item => item.name === name);

    if (found) {
      found.quantity += quantity;
    } else {
      cart.push({ name, price, quantity });
    }

    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
  }

  function renderCart() {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const cartItems = document.getElementById('cartItems');
    const cartTotal = document.getElementById('cartTotal');
    const emptyCart = document.getElementById('emptyCart');
    const cartTable = document.getElementById('cartTable');
    const cartActions = document.getElementById('cartActions');

    cartItems.innerHTML = "";
    let total = 0;

    if (cart.length === 0) {
      emptyCart.style.display = "block";
      cartTable.style.display = "none";
      cartActions.style.display = "none";
      cartTotal.textContent = "";
      return;
    } else {
      emptyCart.style.display = "none";
      cartTable.style.display = "table";
      cartActions.style.display = "block";
    }

    cart.forEach((item, index) => {
      let subtotal = item.price * item.quantity;
      total += subtotal;
      cartItems.innerHTML += `
        <tr>
          <td>${item.name}</td>
          <td>${item.price.toFixed(2)}</td>
          <td>${item.quantity}</td>
          <td>${subtotal.toFixed(2)}</td>
          <td><button class="btn btn-danger btn-sm" onclick="removeItem(${index})">Remove</button></td>
        </tr>
      `;
    });

    cartTotal.textContent = "Total: RM " + total.toFixed(2);
  }

  function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    cart.splice(index, 1);
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
  }

  function clearCart() {
    localStorage.removeItem('cart');
    renderCart();
  }

  // Initial render
  renderCart();
</script>
