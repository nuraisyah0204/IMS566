<!-- Order History -->
<div class="container my-5">
  <h2 class="fw-bold mb-4 text-center">🛒 Your Order History</h2>

  <div class="table-responsive">
    <table class="table table-striped table-hover align-middle shadow-sm">
      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th><i class="bi bi-person-fill"></i> Name</th>
          <th><i class="bi bi-envelope-fill"></i> Email</th>
          <th><i class="bi bi-credit-card"></i> Payment</th>
          <th><i class="bi bi-calendar-event"></i> Date</th>
          <th><i class="bi bi-cash-stack"></i> Total (RM)</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="orderList"></tbody>
    </table>
  </div>

  <div class="mt-4 text-center">

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- Darkmode Toggle Switch JS -->
     <script>
        // get reference
        const darkModeToggle = document.getElementById('darkModeToggle');
        const darkModeIcon = document.getElementById('darkModeIcon');
        const htmlElement = document.documentElement;

        // check save theme
        const currentTheme = localStorage.getItem('theme') || 'light';
        htmlElement.setAttribute('data-bs-theme',currentTheme);
        updateIcon(currentTheme);

        //Toggle darkmode
        darkModeToggle.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';

            htmlElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon(newTheme);
        });

        //Update icon
        function updateIcon(theme){
            if (theme === 'dark'){
                darkModeIcon.className = 'bi bi-sun-fill';
            } else {
                darkModeIcon.className = 'bi bi-moon-stars-fill'
            }
        }
     </script>

<!-- Order List Logic -->
<script>
  function renderOrders() {
    let orders = JSON.parse(localStorage.getItem('orders')) || [];
    const orderList = document.getElementById('orderList');
    orderList.innerHTML = "";

    if (orders.length === 0) {
      orderList.innerHTML = `<tr><td colspan="8" class="text-center text-muted">No orders yet. Start shopping to see your history here!</td></tr>`;
      return;
    }

    orders.forEach((order, index) => {
      let statusBadge;
      if (order.status === "Cancelled") {
        statusBadge = `<span class="badge bg-danger">Cancelled</span>`;
      } else {
        statusBadge = `<span class="badge bg-success">Confirmed - ${order.method || "N/A"}</span>`;
      }

      orderList.innerHTML += `
        <tr>
          <td>${index+1}</td>
          <td>${order.name || "Customer"}</td>
          <td>${order.email || "Not provided"}</td>
          <td>${order.method || "N/A"}</td>
          <td>${order.date || "-"}</td>
          <td><strong>RM ${order.total ? order.total.toFixed(2) : "0.00"}</strong></td>
          <td>${statusBadge}</td>
          <td>
            ${order.status === "Cancelled" 
              ? `<span class="text-muted">No action</span>` 
              : `<button class="btn btn-sm btn-outline-danger" onclick="cancelOrder(${index})">
                   <i class="bi bi-x-circle"></i> Cancel
                 </button>`}
          </td>
        </tr>
      `;
    });
  }

  function cancelOrder(index) {
    let orders = JSON.parse(localStorage.getItem('orders')) || [];

    if (confirm("Do you want to cancel this order?")) {
      // Lepas cancel, tanya sama ada nak remove terus
      if (confirm("Remove this order from history?")) {
        orders.splice(index, 1); // remove terus
      } else {
        orders[index].status = "Cancelled"; // mark as cancelled
      }

      localStorage.setItem('orders', JSON.stringify(orders));
      renderOrders();
    }
  }

  renderOrders();
</script>
