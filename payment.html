<!-- Payment Section -->
<div class="container my-5">
  <h2 class="fw-bold mb-4 text-center">💳 Payment</h2>

  <div class="card p-4 shadow-sm">
    <div class="mb-3">
      <label class="form-label">Payment Method</label>
      <select id="paymentMethod" class="form-select" required>
        <option value="">-- Select Method --</option>
        <option value="Cash">Cash (Pickup)</option>
        <option value="Bank Transfer">Bank Transfer</option>
        <option value="Credit Card">Credit Card</option>
      </select>
    </div>
    <button class="btn btn-warning w-100" onclick="confirmPayment()">Confirm Payment</button>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- Darkmode Toggle Switch JS -->
     <script>
        // get reference
        const darkModeToggle = document.getElementById('darkModeToggle');
        const darkModeIcon = document.getElementById('darkModeIcon');
        const htmlElement = document.documentElement;

        // check save theme
        const currentTheme = localStorage.getItem('theme') || 'light';
        htmlElement.setAttribute('data-bs-theme',currentTheme);
        updateIcon(currentTheme);

        //Toggle darkmode
        darkModeToggle.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';

            htmlElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon(newTheme);
        });

        //Update icon
        function updateIcon(theme){
            if (theme === 'dark'){
                darkModeIcon.className = 'bi bi-sun-fill';
            } else {
                darkModeIcon.className = 'bi bi-moon-stars-fill'
            }
        }
     </script>

<!-- Payment Logic -->
<script>
  function confirmPayment() {
    const method = document.getElementById('paymentMethod').value;
    if (!method) {
      alert("Please select a payment method!");
      return;
    }

    // Ambil data checkout (fallback kalau kosong)
    const name = localStorage.getItem('checkoutName') || "Customer";
    const email = localStorage.getItem('checkoutEmail') || "Not provided";

    // Ambil cart
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let total = 0;
    cart.forEach(item => {
      total += item.price * item.quantity;
    });

    // Simpan order ke dalam orders
    let orders = JSON.parse(localStorage.getItem('orders')) || [];
    orders.push({
      name: name,
      email: email,
      method: method,
      total: total,
      date: new Date().toLocaleString(),
      status: "Confirmed" // terus dianggap Confirmed
    });
    localStorage.setItem('orders', JSON.stringify(orders));

    // Kosongkan cart selepas confirm
    localStorage.removeItem('cart');

    alert("Order confirmed! Thank you for your payment via " + method);
    window.location.href = "order-list.html";
  }
</script>
