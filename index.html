<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIS Project Repository</title>
  <!-- Bootstrap CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icon CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <!-- Google Font API -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body id="varta-bg">

  <div class="d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4 m-2 login-card">
      <h5 class="text-center text-black fw-bold fs-3">WELCOME!</h5>
      <div class="row">
        <div class="col-md-6 border-end d-flex justify-content-center align-items-center">
          <!-- Left side -->
          <img src="https://i.pinimg.com/736x/a2/fa/89/a2fa896102b5bfe33a5c16ef394b6705.jpg" 
               class="img-fluid" style="max-height:250px;" alt="Login Image">
        </div>

        <!-- Right side -->
        <div class="col-md-6">
          <form id="loginForm">
            <label class="fw-bold fs-5 text-black">Email</label>
            <input name="email" type="email" placeholder="name@jewellery.com" class="form-control mb-2" required>

            <label class="fw-bold fs-5 text-black">Password</label>
            <input name="password" type="password" class="form-control mb-2" required>

            <div class="text-end">
              <button type="submit" class="btn btn-primary btn-sm">Submit</button>
            </div>
          </form>
        </div>
      </div>
    </div>  
  </div>

  <!-- Redirect Script -->
  <script>
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', function(event) {
      event.preventDefault(); // hentikan submit default
      window.location.href = "dashboard.html"; // redirect ke dashboard
    });
  </script>

  <!-- Bootstrap JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <!-- VANTA Background JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.clouds.min.js"></script>
  <script>
    VANTA.CLOUDS({
      el: "#varta-bg",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      skyColor: 0xe3dcca,
      cloudColor: 0xbbb7aa,
      cloudShadowColor: 0x3a3a28
    })
  </script>
</body>
</html>
